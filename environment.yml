name: lingshu

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core scientific stack
  - numpy>=1.24
  - pandas>=2.0
  - pyarrow>=14.0
  - pillow>=10.0
  - tqdm>=4.65

  # PyTorch via conda
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # Helpful build/runtime deps
  - packaging
  - setuptools
  - wheel

  # Python packages via pip
  - pip:
      - transformers>=4.40.0
      - accelerate
      - sentencepiece
      - safetensors
      - vllm>=0.4.0